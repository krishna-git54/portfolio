<svg xmlns="http://www.w3.org/2000/svg" width="640" height="420" viewBox="0 0 640 420" role="img" aria-labelledby="title desc">
  <title id="title">DevOps tools overview</title>
  <desc id="desc">Static DevOps tools image with DevOps in the center and Jenkins, Docker, Kubernetes, AWS, Linux, and Git around it.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#eff6ff"/>
      <stop offset="100%" stop-color="#dbeafe"/>
    </linearGradient>
    <linearGradient id="center" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#0ea5e9"/>
    </linearGradient>
    <style>
      .heading { font: 700 26px Arial, sans-serif; fill: #0f172a; }
      .sub { font: 500 12px Arial, sans-serif; fill: #475569; }
      .tool { font: 700 13px Arial, sans-serif; fill: #0f172a; }
      .meta { font: 500 10px Arial, sans-serif; fill: #64748b; }
      .center-title { font: 700 24px Arial, sans-serif; fill: #ffffff; }
      .center-sub { font: 600 11px Arial, sans-serif; fill: #dbeafe; }
    </style>
  </defs>

  <rect width="640" height="420" rx="28" fill="url(#bg)"/>
  <text x="320" y="44" text-anchor="middle" class="heading">DevOps Tools</text>
  <text x="320" y="66" text-anchor="middle" class="sub">Simple static overview of common DevOps technologies</text>

  <g stroke="#94a3b8" stroke-width="4" stroke-linecap="round">
    <line x1="320" y1="210" x2="320" y2="110"/>
    <line x1="320" y1="210" x2="320" y2="320"/>
    <line x1="320" y1="210" x2="180" y2="210"/>
    <line x1="320" y1="210" x2="460" y2="210"/>
    <line x1="320" y1="210" x2="220" y2="130"/>
    <line x1="320" y1="210" x2="420" y2="130"/>
  </g>

  <circle cx="320" cy="210" r="74" fill="url(#center)"/>
  <text x="320" y="202" text-anchor="middle" class="center-sub">Automation and Delivery</text>
  <text x="320" y="230" text-anchor="middle" class="center-title">DevOps</text>

  <g>
    <rect x="265" y="82" width="110" height="48" rx="14" fill="#ffffff" stroke="#cbd5e1"/>
    <text x="320" y="103" text-anchor="middle" class="tool">Jenkins</text>
    <text x="320" y="119" text-anchor="middle" class="meta">CI/CD</text>

    <rect x="125" y="186" width="110" height="48" rx="14" fill="#ffffff" stroke="#cbd5e1"/>
    <text x="180" y="207" text-anchor="middle" class="tool">Linux</text>
    <text x="180" y="223" text-anchor="middle" class="meta">Operations</text>

    <rect x="405" y="186" width="110" height="48" rx="14" fill="#ffffff" stroke="#cbd5e1"/>
    <text x="460" y="207" text-anchor="middle" class="tool">Docker</text>
    <text x="460" y="223" text-anchor="middle" class="meta">Containers</text>

    <rect x="265" y="300" width="110" height="48" rx="14" fill="#ffffff" stroke="#cbd5e1"/>
    <text x="320" y="321" text-anchor="middle" class="tool">Kubernetes</text>
    <text x="320" y="337" text-anchor="middle" class="meta">Orchestration</text>

    <rect x="165" y="106" width="110" height="48" rx="14" fill="#ffffff" stroke="#cbd5e1"/>
    <text x="220" y="127" text-anchor="middle" class="tool">Git</text>
    <text x="220" y="143" text-anchor="middle" class="meta">Source Control</text>

    <rect x="365" y="106" width="110" height="48" rx="14" fill="#ffffff" stroke="#cbd5e1"/>
    <text x="420" y="127" text-anchor="middle" class="tool">AWS</text>
    <text x="420" y="143" text-anchor="middle" class="meta">Cloud</text>
  </g>
</svg>
