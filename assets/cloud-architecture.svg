<svg xmlns="http://www.w3.org/2000/svg" width="720" height="420" viewBox="0 0 720 420" role="img" aria-labelledby="title desc">
  <title id="title">CI/CD pipeline and Kubernetes architecture</title>
  <desc id="desc">A structured DevOps flow showing Source Code, Jenkins CI/CD, Docker Images, AWS Cloud, and Kubernetes Orchestration.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#dff2ff"/>
      <stop offset="100%" stop-color="#f8fbff"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#eef4fb"/>
    </linearGradient>
    <linearGradient id="cluster" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#18253a"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#0f172a" flood-opacity="0.12"/>
    </filter>
    <style>
      .title { font: 700 15px 'Arial', sans-serif; fill: #0f172a; }
      .label { font: 500 11px 'Arial', sans-serif; fill: #475569; }
      .section { font: 700 14px 'Arial', sans-serif; letter-spacing: 0.08em; text-transform: uppercase; fill: #0f172a; }
      .headline { font: 700 17px 'Arial', sans-serif; fill: #0f172a; }
      .caption { font: 500 11px 'Arial', sans-serif; fill: #475569; }
      .small { font: 700 9px 'Arial', sans-serif; letter-spacing: 0.05em; text-transform: uppercase; }
    </style>
  </defs>

  <rect width="720" height="420" rx="34" fill="url(#bg)"/>
  <rect x="16" y="16" width="688" height="388" rx="28" fill="none" stroke="#cfe3f5"/>

  <text x="58" y="52" class="section">Cloud Structure</text>
  <text x="58" y="82" class="headline">Structured DevOps Delivery Flow</text>
  <text x="58" y="106" class="caption">From repository changes to container deployment on AWS-backed Kubernetes infrastructure</text>

  <g fill="none" stroke="#8fa3ba" stroke-width="5" stroke-linecap="round">
    <path d="M172 182h48"/>
    <path d="M324 182h48"/>
    <path d="M476 182h48"/>
    <path d="M360 224v28"/>
    <path d="M244 260h232"/>
  </g>

  <g stroke="#cbd5e1" filter="url(#softShadow)">
    <rect x="48" y="132" width="124" height="92" rx="22" fill="url(#panel)"/>
    <rect x="200" y="132" width="124" height="92" rx="22" fill="url(#panel)"/>
    <rect x="352" y="132" width="124" height="92" rx="22" fill="url(#panel)"/>
    <rect x="504" y="132" width="124" height="92" rx="22" fill="url(#panel)"/>
  </g>

  <g transform="translate(110 156)">
    <path d="M-18 8h36" stroke="#2563eb" stroke-width="4" stroke-linecap="round"/>
    <path d="M-14 -8l14 -14 10 10 12 -12" fill="none" stroke="#0f766e" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="-14" cy="-8" r="4" fill="#0f766e"/>
    <circle cx="0" cy="-22" r="4" fill="#0f766e"/>
    <circle cx="10" cy="-12" r="4" fill="#0f766e"/>
    <circle cx="22" cy="-24" r="4" fill="#0f766e"/>
  </g>
  <text x="110" y="192" text-anchor="middle" class="title">Source Code</text>
  <text x="110" y="212" text-anchor="middle" class="label">Git Repository</text>

  <g transform="translate(262 156)">
    <circle cx="0" cy="-2" r="22" fill="#d33833"/>
    <circle cx="0" cy="-2" r="14" fill="#ffffff"/>
    <rect x="-9" y="-34" width="18" height="24" rx="7" fill="#f5d0a9"/>
    <path d="M-14 -30c5 -9 23 -9 28 0v8h-28z" fill="#5b3124"/>
    <path d="M-14 13h28l-5 9h-18z" fill="#111827"/>
    <path d="M-5 -6h4v4h-4zm6 0h4v4H1z" fill="#111827"/>
    <path d="M-4 5c3 2 9 2 12 0" fill="none" stroke="#111827" stroke-width="2" stroke-linecap="round"/>
  </g>
  <text x="262" y="192" text-anchor="middle" class="title">Jenkins</text>
  <text x="262" y="212" text-anchor="middle" class="label">CI/CD Pipeline</text>

  <g transform="translate(414 156)" fill="#2496ed">
    <rect x="-24" y="-6" width="10" height="10" rx="2"/>
    <rect x="-12" y="-6" width="10" height="10" rx="2"/>
    <rect x="0" y="-6" width="10" height="10" rx="2"/>
    <rect x="12" y="-6" width="10" height="10" rx="2"/>
    <rect x="-12" y="-18" width="10" height="10" rx="2"/>
    <rect x="0" y="-18" width="10" height="10" rx="2"/>
    <rect x="12" y="-18" width="10" height="10" rx="2"/>
    <path d="M-28 8h54c-3 10-10 16-19 16h-16c-11 0-16-6-19-16z"/>
    <path d="M29 -3c4 -1 8 2 10 6-3 3-7 4-10 3z"/>
  </g>
  <text x="414" y="192" text-anchor="middle" class="title">Docker</text>
  <text x="414" y="212" text-anchor="middle" class="label">Container Images</text>

  <g transform="translate(566 154)">
    <text x="0" y="-2" text-anchor="middle" font-family="Arial, sans-serif" font-size="25" font-weight="700" fill="#111827">aws</text>
    <path d="M-22 14c15 9 32 10 45 1" fill="none" stroke="#ff9900" stroke-width="4.5" stroke-linecap="round"/>
    <path d="M13 12l10 2-7 8" fill="#ff9900"/>
  </g>
  <text x="566" y="192" text-anchor="middle" class="title">AWS</text>
  <text x="566" y="212" text-anchor="middle" class="label">Cloud Platform</text>

  <g filter="url(#softShadow)">
    <rect x="212" y="254" width="296" height="120" rx="28" fill="url(#cluster)"/>
  </g>
  <text x="360" y="248" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="700" fill="#0f172a">Kubernetes Orchestration Layer</text>

  <g transform="translate(280 320)">
    <polygon points="0,-24 21,-12 21,12 0,24 -21,12 -21,-12" fill="#326ce5"/>
    <circle r="11" fill="#ffffff"/>
    <circle r="3.5" fill="#326ce5"/>
    <g stroke="#326ce5" stroke-width="3" stroke-linecap="round">
      <path d="M0-16v8"/>
      <path d="M14-8-7 4"/>
      <path d="M14 8-7-4"/>
      <path d="M0 16v-8"/>
      <path d="M-14 8 7-4"/>
      <path d="M-14-8 7 4"/>
    </g>
  </g>
  <g transform="translate(360 320)">
    <rect x="-24" y="-16" width="48" height="32" rx="10" fill="#2496ed"/>
    <rect x="-14" y="-5" width="7" height="7" rx="2" fill="#bfe3ff"/>
    <rect x="-3" y="-5" width="7" height="7" rx="2" fill="#bfe3ff"/>
    <rect x="8" y="-5" width="7" height="7" rx="2" fill="#bfe3ff"/>
  </g>
  <g transform="translate(440 320)">
    <path d="M0 -20c12 0 22 9 22 21 0 16-22 33-22 33S-22 17-22 1c0-12 10-21 22-21z" fill="#ff9900"/>
    <path d="M0 -5l5 10H-5z" fill="#ffffff" opacity="0.9"/>
  </g>

  <text x="280" y="372" text-anchor="middle" class="small" fill="#dbeafe">KUBERNETES</text>
  <text x="360" y="372" text-anchor="middle" class="small" fill="#dbeafe">SERVICES</text>
  <text x="440" y="372" text-anchor="middle" class="small" fill="#dbeafe">AWS NODES</text>

  <text x="360" y="398" text-anchor="middle" class="caption">Container orchestration, service scaling, and production delivery</text>

  <circle cx="196" cy="182" r="4" fill="#0f766e"/>
  <circle cx="348" cy="182" r="4" fill="#d33833"/>
  <circle cx="500" cy="182" r="4" fill="#2496ed"/>
</svg>
